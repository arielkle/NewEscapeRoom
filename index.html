<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדר בריחה דיגיטלי - משחק</title>
    
    <!-- ספריות עיצוב ופונטים -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #000000; color: #e2e8f0; overflow: hidden; margin: 0; padding: 0; }
        .theme-font { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; } 
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }

        /* אזורים חמים */
        .hotspot-play { border: 3px solid transparent; z-index: 10; cursor: pointer; transition: all 0.3s; position: absolute; }
        .hotspot-play:hover { border-color: rgba(6, 182, 212, 0.5); background: rgba(6, 182, 212, 0.1); }
        
        /* עיבוד גודל תמונה למניעת חיתוך ופרופורציות נכונות */
        .image-display-area {
            position: relative;
            display: inline-block;
            max-width: 100vw;
            max-height: 100vh;
        }
        
        #student-image {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }

        /* אלמנטים צפים על המסך המלא */
        .floating-ui {
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        /* Modal Custom Box */
        .modal-box {
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden text-white bg-black">

    <!-- מסך פתיחה לתלמיד -->
    <div id="screen-intro" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-950 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120] relative">
        <i class="fas fa-user-secret text-cyan-500 text-6xl mb-6 opacity-80"></i>
        <h1 class="text-6xl font-black text-cyan-400 mb-2 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)] theme-font text-center">חדר בריחה דיגיטלי</h1>
        <p class="text-xl text-slate-400 mb-12 tracking-widest text-center">היכנסו אל החדר</p>
        
        <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-indigo-500 transition-colors shadow-2xl flex flex-col items-center text-center relative overflow-hidden group max-w-md w-full">
            <div class="absolute inset-0 bg-indigo-500/5 group-hover:bg-indigo-500/10 transition-colors"></div>
            <div class="w-20 h-20 bg-indigo-900 border border-indigo-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(99,102,241,0.5)] z-10 text-indigo-300">
                <i class="fas fa-play text-3xl ml-2"></i>
            </div>
            <h2 class="text-3xl font-bold mb-4 z-10 text-indigo-100 text-center">טעינת משימה</h2>
            <p class="text-slate-400 mb-8 z-10 text-sm text-center">העלו את קובץ המשחק (JSON) שקיבלתם מהמורה כדי להתחיל.</p>
            <label class="bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 w-full block z-10 shadow-lg text-center">
                בחר קובץ והתחל
                <input type="file" class="hidden" accept=".json" onchange="handleLoadGame(event)">
            </label>
        </div>

        <!-- קרדיט -->
        <div class="absolute bottom-4 left-0 w-full text-center pointer-events-none">
            <p class="text-[11px] md:text-xs text-slate-500/80 theme-font tracking-wide">
                אריאל קלפנר, טכנופדגוגיה, בינה מלאכותית והערכה בחינוך - 050-9540538
            </p>
        </div>
    </div>

    <!-- מסך תלמיד (משחק במסך מלא) -->
    <div id="screen-student" class="hidden h-screen w-screen bg-black relative flex items-center justify-center">
        
        <!-- סטאטוס התקדמות (צף) -->
        <div class="absolute top-4 left-4 md:top-6 md:left-6 z-30 floating-ui">
            <div id="student-progress-text" class="text-cyan-100 font-bold bg-black/60 backdrop-blur-sm border border-cyan-800/50 px-4 py-2 rounded-full text-sm tracking-wide shadow-lg text-center"></div>
        </div>

        <!-- אזור התמונה -->
        <div class="image-display-area">
            <img id="student-image" src="" draggable="false" class="select-none pointer-events-none" alt="חידת חדר בריחה">
            <div id="student-hotspot" class="hotspot-play" onclick="handleImageClick()"></div>
        </div>
        
        <!-- רמז (צף למטה) -->
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-30 floating-ui w-full text-center pointer-events-none">
            <div id="student-hint-text" class="inline-block bg-black/60 backdrop-blur-sm px-6 py-2 rounded-full text-slate-300 theme-font text-xs tracking-widest uppercase shadow-lg border border-slate-800/50"></div>
        </div>
    </div>

    <!-- מודאל שאלה -->
    <div id="modal-lock" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md text-center">
        <div class="bg-slate-900 p-8 md:p-10 rounded-2xl border border-cyan-800 max-w-md w-full text-center relative overflow-hidden modal-box">
            <div class="absolute top-0 left-0 w-full h-1 bg-cyan-500 shadow-[0_0_15px_rgba(6,182,212,1)]"></div>
            <h2 class="theme-font text-3xl font-bold text-cyan-400 mb-6 tracking-widest uppercase text-center">הזנת קוד גישה</h2>
            <p id="modal-question" class="text-lg mb-8 leading-relaxed text-slate-300 bg-slate-800/50 p-6 rounded-lg border border-slate-700 text-center"></p>
            <div class="space-y-6">
                <input id="modal-input" type="text" placeholder="הקלידו תשובה..." autocomplete="off" class="w-full bg-[#0b1120] border-2 border-slate-700 focus:border-cyan-500 rounded-xl px-6 py-4 text-center text-2xl theme-font text-cyan-300 font-bold outline-none">
                <div id="modal-feedback" class="hidden font-bold flex items-center justify-center py-2 rounded-lg text-sm theme-font tracking-wider"></div>
                <div class="flex gap-4">
                    <button onclick="checkAnswer()" class="flex-1 bg-cyan-700 hover:bg-cyan-600 text-white font-bold py-4 rounded-xl transition shadow-[0_0_15px_rgba(6,182,212,0.3)] text-lg uppercase tracking-widest">אימות צופן</button>
                    <button onclick="closeModal()" class="px-6 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl transition border border-slate-700" title="סגירה"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- מסך ניצחון -->
    <div id="screen-victory" class="hidden fixed inset-0 bg-[#0b1120] z-[200] flex flex-col items-center justify-center text-center p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <div class="relative mb-10 text-center"><i class="fas fa-check text-9xl text-cyan-400 drop-shadow-[0_0_25px_rgba(6,182,212,0.8)]"></i></div>
        <h1 class="theme-font text-7xl font-bold text-cyan-400 mb-6 uppercase tracking-widest text-center">יצאתם לחופשי! 🏆</h1>
        <p class="text-xl text-slate-400 mb-12 max-w-lg mx-auto text-center">כל הכבוד, פיצחתם את כל החידות בהצלחה!</p>
        <button onclick="location.reload()" class="bg-transparent border-2 border-cyan-600 text-cyan-400 px-10 py-3 rounded-full font-bold text-lg hover:bg-cyan-900/30 text-center transition">שחקו שוב</button>
    </div>

    <script>
        // --- משתני מערכת ---
        let levels = [];
        let currentLevelIndex = 0;

        // --- רכיבי DOM ---
        const screens = {
            intro: document.getElementById('screen-intro'),
            student: document.getElementById('screen-student'),
            victory: document.getElementById('screen-victory'),
            modal: document.getElementById('modal-lock')
        };

        const studentDOM = {
            progress: document.getElementById('student-progress-text'),
            img: document.getElementById('student-image'),
            hotspot: document.getElementById('student-hotspot'),
            hint: document.getElementById('student-hint-text'),
            modalInput: document.getElementById('modal-input'),
            modalQ: document.getElementById('modal-question'),
            modalFeedback: document.getElementById('modal-feedback')
        };

        // --- פונקציות עזר ---
        // הצגת מסך ספציפי והסתרת השאר
        function showScreen(screenName) {
            Object.values(screens).forEach(s => { if (s) s.classList.add('hidden'); });
            if (screens[screenName]) screens[screenName].classList.remove('hidden');
        }

        // טעינת קובץ המשחק מ-JSON
        function handleLoadGame(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let data = JSON.parse(e.target.result);
                    // תמיכה בגרסאות שונות של שמירת הקובץ
                    let parsedLevels = Array.isArray(data) ? data : (data.levels || []);
                    
                    if (!parsedLevels || parsedLevels.length === 0) {
                        throw new Error("לא נמצאו שלבים בקובץ");
                    }
                    
                    // עיבוד הנתונים כדי לוודא שיש להם את כל השדות הנדרשים
                    levels = parsedLevels.map(l => ({
                        ...l, 
                        type: l.type || 'puzzle',
                        hotspot: l.hotspot || { x: 40, y: 40, width: 20, height: 20 }
                    }));
                    
                    // תחילת המשחק
                    currentLevelIndex = 0;
                    showScreen('student');
                    renderStudentUI();
                } catch (err) { 
                    alert("שגיאה בטעינת הקובץ. אנא ודאו שזהו קובץ המשחק התקין (JSON) שהמורה שלח."); 
                    console.error("Error loading file:", err);
                }
                event.target.value = ''; // איפוס ה-input כדי לאפשר טעינה חוזרת של אותו קובץ
            };
            reader.readAsText(file);
        }

        // טיפול בלחיצה על האזור החם בתמונה
        function handleImageClick() {
            const level = levels[currentLevelIndex];
            if (!level) return;
            
            if (level.type === 'intro') {
                // מסך פתיחה - מעבר ישיר לשלב הבא
                if (currentLevelIndex < levels.length - 1) { 
                    currentLevelIndex++; 
                    renderStudentUI(); 
                } else {
                    showScreen('victory');
                }
            } else if (level.type === 'end') {
                // מסך סיום - מציג את מסך הניצחון
                showScreen('victory');
            } else {
                // חידה - פתיחת חלון קופץ להזנת קוד
                openModal();
            }
        }

        // פתיחת חלון הזנת הקוד
        function openModal() {
            const current = levels[currentLevelIndex];
            if (!current) return;
            
            studentDOM.modalQ.innerText = current.question || "מהו הקוד?";
            studentDOM.modalInput.value = "";
            studentDOM.modalFeedback.className = 'hidden';
            
            // איפוס סגנונות הקלט ממצבי שגיאה קודמים
            studentDOM.modalInput.className = "w-full bg-[#0b1120] border-2 border-slate-700 focus:border-cyan-500 rounded-xl px-6 py-4 text-center text-2xl theme-font text-cyan-300 font-bold transition-all outline-none tracking-widest shadow-inner";
            
            if (screens.modal) screens.modal.classList.remove('hidden');
            
            // מיקוד אוטומטי על שדה הקלט
            setTimeout(() => { 
                if (studentDOM.modalInput) studentDOM.modalInput.focus(); 
            }, 100);
        }

        // סגירת החלון הקופץ
        function closeModal() { 
            if (screens.modal) screens.modal.classList.add('hidden'); 
        }

        // עדכון מיקום וגודל האזור החם על המסך
        function updateHotspotVisual(el, data) {
            if (!el || !data) return;
            el.style.top = data.y + "%"; 
            el.style.left = data.x + "%";
            el.style.width = data.width + "%"; 
            el.style.height = data.height + "%";
        }

        // עדכון תצוגת המשתמש לפי השלב הנוכחי
        function renderStudentUI() {
            const current = levels[currentLevelIndex];
            if (!current) return;
            
            // חישוב התקדמות החידות (מתעלם ממסכי פתיחה/סיום)
            const puzzleCount = levels.filter(l => l.type === 'puzzle').length;
            const currentPuzzleIdx = levels.slice(0, currentLevelIndex + 1).filter(l => l.type === 'puzzle').length;

            // עדכון טקסטים בהתאם לסוג השלב
            if (current.type === 'intro') {
                studentDOM.progress.innerText = `הקדמה`;
                studentDOM.hint.innerHTML = '<i class="fas fa-door-open ml-1"></i> מצאו את אזור הלחיצה כדי להמשיך';
            } else if (current.type === 'end') {
                studentDOM.progress.innerText = `סיום המשימה`;
                studentDOM.hint.innerHTML = '<i class="fas fa-flag-checkered ml-1"></i> מצאו את אזור הלחיצה לסיום המשחק';
            } else {
                studentDOM.progress.innerText = `חידה ${currentPuzzleIdx} מתוך ${puzzleCount}`;
                studentDOM.hint.innerHTML = '<i class="fas fa-search ml-1"></i> מצאו את המנעול בתמונה ולחצו עליו';
            }
            
            // עדכון אזור חם
            if (studentDOM.hotspot) { 
                updateHotspotVisual(studentDOM.hotspot, current.hotspot); 
            }
            
            // עדכון התמונה
            if (studentDOM.img) {
                studentDOM.img.src = current.image;
            }
        }

        // בדיקת התשובה שהוזנה על ידי התלמיד
        function checkAnswer() {
            const current = levels[currentLevelIndex];
            if (!current) return;
            
            const input = studentDOM.modalInput.value.trim().toLowerCase();
            const correct = (current.answer || "").trim().toLowerCase();
            const fb = studentDOM.modalFeedback;
            
            // לוגיקת בדיקה: האם זה בדיוק הקוד, או שהקוד מוכל בתשובה (לסלחנות במקרה של קוד ארוך)
            if (input === correct || (correct.length > 2 && input.includes(correct))) {
                // תשובה נכונה
                fb.innerHTML = `<i class="fas fa-check-circle ml-2"></i> הקוד נכון! המנעול נפתח.`;
                fb.className = "mt-3 block text-green-400 bg-green-900/20 border border-green-700/50 py-3 rounded-lg text-center font-bold";
                fb.classList.remove('hidden');
                
                // מעבר לשלב הבא אחרי השהייה קצרה
                setTimeout(() => { 
                    closeModal(); 
                    if (currentLevelIndex < levels.length - 1) { 
                        currentLevelIndex++; 
                        renderStudentUI(); 
                    } else { 
                        showScreen('victory'); 
                    } 
                }, 1500);
            } else {
                // תשובה שגויה
                fb.innerHTML = `<i class="fas fa-times-circle ml-2"></i> קוד שגוי. נסו שוב!`;
                fb.className = "mt-3 block text-red-400 bg-red-900/20 border border-red-700/50 py-3 rounded-lg text-center font-bold";
                fb.classList.remove('hidden');
                
                // הפעלת אנימציית רעידה על שדה הקלט
                if (studentDOM.modalInput) { 
                    studentDOM.modalInput.classList.remove('animate-shake'); // איפוס
                    void studentDOM.modalInput.offsetWidth; // "טריק" כדי לאתחל את האנימציה
                    studentDOM.modalInput.classList.add('animate-shake'); 
                }
            }
        }
        
        // הוספת האזנה למקש Enter בשדה הקלט
        if (studentDOM.modalInput) {
            studentDOM.modalInput.addEventListener('keypress', (e) => { 
                if (e.key === 'Enter') checkAnswer(); 
            });
        }
        
        // יצירת קובץ הדגמה (Dummy JSON) למקרה שהמשתמש רוצה לבדוק בלי קובץ אמיתי
        // למטרות הצגה בלבד, מאפשר בדיקה אם אין למשתמש קובץ.
        window.loadDemoGame = function() {
            // יצירת קנבס ליצירת תמונה בסיסית במקום base64 ארוך
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 600;
            const ctx = canvas.getContext('2d');
            
            // תמונת הדגמה - רקע כהה עם כספת
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, 800, 600);
            
            // ציור כספת מדומה
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(300, 200, 200, 200); // גוף
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 4;
            ctx.strokeRect(300, 200, 200, 200); // מסגרת
            
            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.arc(400, 300, 30, 0, Math.PI * 2); // חוגה
            ctx.fill();
            
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '24px Assistant, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('דוגמה לחידה', 400, 150);
            
            const dummyImage = canvas.toDataURL('image/jpeg');
            
            levels = [{
                id: 1,
                image: dummyImage,
                type: 'puzzle',
                question: 'הקוד להדגמה הוא 1234',
                answer: '1234',
                hotspot: { x: 45, y: 45, width: 10, height: 10 }
            }];
            
            currentLevelIndex = 0;
            showScreen('student');
            renderStudentUI();
        };

        // הוספת אפשרות לטעינת הדגמה (לנוחות בלבד, מוסתר בממשק המשתמש הרגיל, ניתן להפעיל מקונסול)
        console.log("Tip: You can run loadDemoGame() in the console to test without a JSON file.");
    </script>
</body>
</html>
